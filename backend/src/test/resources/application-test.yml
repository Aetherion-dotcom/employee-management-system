spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  thymeleaf:
    cache: false
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  cache:
    type: none

jwt:
  secret: d2f8c3b4e5a6f7890123456789abcdef0123456789abcdef0123456789abcdef
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

app:
  base-url: http://localhost:8080
  upload-dir: ./test-uploads
  cors:
    allowed-origins: http://localhost:8080

logging:
  level:
    root: WARN
    com.workforcehub: DEBUG
