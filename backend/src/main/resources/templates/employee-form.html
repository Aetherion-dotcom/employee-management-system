<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee != null ? 'Edit Employee' : 'Add Employee'} + ' | WorkForceHub'">Employee Form | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="brand-icon">W</div><span class="brand">WorkForceHub</span></div>
        <nav class="sidebar-nav">
            <div class="nav-section"><div class="nav-section-title">Main</div>
                <a href="/dashboard" class="nav-link-custom"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="/employees" class="nav-link-custom active"><i class="bi bi-people-fill"></i> Employees</a>
                <a href="/departments" class="nav-link-custom"><i class="bi bi-building"></i> Departments</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
                <h6 style="margin:0;font-weight:600" th:text="${employee != null ? 'Edit Employee' : 'Add New Employee'}">Add Employee</h6>
            </div>
            <div class="header-right"><button class="theme-toggle" id="themeToggle"><i class="bi bi-moon"></i></button></div>
        </header>

        <div class="page-content">
            <div class="card-custom animate-fade-in">
                <div class="card-header-custom">
                    <h5><i class="bi bi-person-plus me-2"></i><span th:text="${employee != null ? 'Edit Employee Details' : 'New Employee Registration'}">Employee Form</span></h5>
                </div>
                <div class="card-body-custom">
                    <form id="employeeForm" onsubmit="submitEmployeeForm(event)">
                        <input type="hidden" id="empId" th:value="${employee?.id}">

                        <h6 style="font-weight:700;margin-bottom:1rem;color:var(--primary)"><i class="bi bi-person me-1"></i> Personal Information</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4 form-group"><label>First Name *</label><input type="text" id="firstName" class="form-control-custom" required th:value="${employee?.firstName}"></div>
                            <div class="col-md-4 form-group"><label>Last Name *</label><input type="text" id="lastName" class="form-control-custom" required th:value="${employee?.lastName}"></div>
                            <div class="col-md-4 form-group"><label>Email *</label><input type="email" id="email" class="form-control-custom" required th:value="${employee?.email}"></div>
                            <div class="col-md-4 form-group"><label>Phone</label><input type="text" id="phone" class="form-control-custom" th:value="${employee?.phone}"></div>
                            <div class="col-md-4 form-group"><label>Gender</label>
                                <select id="gender" class="form-control-custom">
                                    <option value="">Select</option><option value="MALE">Male</option><option value="FEMALE">Female</option><option value="OTHER">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4 form-group"><label>Date of Birth</label><input type="date" id="dateOfBirth" class="form-control-custom" th:value="${employee?.dateOfBirth}"></div>
                        </div>

                        <h6 style="font-weight:700;margin-bottom:1rem;color:var(--primary)"><i class="bi bi-briefcase me-1"></i> Employment Details</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4 form-group"><label>Designation *</label><input type="text" id="designation" class="form-control-custom" required th:value="${employee?.designation}"></div>
                            <div class="col-md-4 form-group"><label>Department *</label>
                                <select id="departmentId" class="form-control-custom" required>
                                    <option value="">Select Department</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}" th:selected="${employee?.departmentId == dept.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-4 form-group"><label>Joining Date *</label><input type="date" id="joiningDate" class="form-control-custom" required th:value="${employee?.joiningDate}"></div>
                            <div class="col-md-4 form-group"><label>Salary</label><input type="number" step="0.01" id="salary" class="form-control-custom" th:value="${employee?.salary}"></div>
                            <div class="col-md-4 form-group"><label>Status</label>
                                <select id="status" class="form-control-custom">
                                    <option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option><option value="PROBATION">Probation</option><option value="ON_LEAVE">On Leave</option>
                                </select>
                            </div>
                        </div>

                        <h6 style="font-weight:700;margin-bottom:1rem;color:var(--primary)"><i class="bi bi-geo-alt me-1"></i> Address</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12 form-group"><label>Address</label><input type="text" id="address" class="form-control-custom" th:value="${employee?.address}"></div>
                            <div class="col-md-3 form-group"><label>City</label><input type="text" id="city" class="form-control-custom" th:value="${employee?.city}"></div>
                            <div class="col-md-3 form-group"><label>State</label><input type="text" id="state" class="form-control-custom" th:value="${employee?.state}"></div>
                            <div class="col-md-3 form-group"><label>Zip Code</label><input type="text" id="zipCode" class="form-control-custom" th:value="${employee?.zipCode}"></div>
                            <div class="col-md-3 form-group"><label>Country</label><input type="text" id="country" class="form-control-custom" th:value="${employee?.country}"></div>
                        </div>

                        <div style="display:flex;gap:0.75rem;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--border-color)">
                            <a href="/employees" class="btn-outline-custom">Cancel</a>
                            <button type="submit" class="btn-primary-custom"><i class="bi bi-check-lg me-1"></i> <span th:text="${employee != null ? 'Update' : 'Create'}">Save</span> Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
function submitEmployeeForm(e) {
    e.preventDefault();
    const id = document.getElementById('empId').value;
    const data = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        gender: document.getElementById('gender').value || null,
        dateOfBirth: document.getElementById('dateOfBirth').value || null,
        designation: document.getElementById('designation').value,
        departmentId: parseInt(document.getElementById('departmentId').value),
        joiningDate: document.getElementById('joiningDate').value,
        salary: document.getElementById('salary').value ? parseFloat(document.getElementById('salary').value) : null,
        status: document.getElementById('status').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zipCode: document.getElementById('zipCode').value,
        country: document.getElementById('country').value
    };
    const method = id ? 'PUT' : 'POST';
    const url = id ? `/employees/${id}` : '/employees';
    WorkForceHub.apiCall(url, method, data).then(resp => {
        if (resp && resp.success) {
            WorkForceHub.showToast(id ? 'Employee updated!' : 'Employee created!', 'success');
            setTimeout(() => window.location.href = '/employees', 500);
        } else {
            WorkForceHub.showToast(resp?.message || 'Failed to save', 'error');
        }
    });
}
</script>
</body>
</html>
