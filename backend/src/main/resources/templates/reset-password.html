<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WorkForceHub - Reset Your Password">
    <title>Reset Password | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex align-items-center justify-content-center bg-body-tertiary min-vh-100">
    <div class="card shadow-sm p-4 w-100 mx-auto" style="max-width: 450px;">
        <div class="text-center mb-4">
            <h1 class="text-primary fs-3 fw-bold"><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1>
            <p class="text-muted small">Set a new password for your account</p>
        </div>

        <form id="resetPasswordForm" onsubmit="handleResetPassword(event)" class="needs-validation" novalidate>
            <input type="hidden" id="resetToken">

            <div class="mb-3">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required minlength="8">
                <div class="invalid-feedback">Password must be at least 8 characters.</div>
            </div>
            <div class="mb-3">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                <div class="invalid-feedback">Please confirm your password.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="resetBtn">
                <span id="resetBtnText">Reset Password</span>
                <span id="resetSpinner" style="display:none"><i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite"></i></span>
            </button>

            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem">
                <a href="/login" style="font-weight:600"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </p>
        </form>
    </div>
</div>

<style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
    // Extract token from URL query param
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) document.getElementById('resetToken').value = token;

    async function handleResetPassword(e) {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            WorkForceHub.showToast('Passwords do not match.', 'error');
            return;
        }

        const btn = document.getElementById('resetBtn');
        const text = document.getElementById('resetBtnText');
        const spinner = document.getElementById('resetSpinner');
        text.style.display = 'none';
        spinner.style.display = 'inline';
        btn.disabled = true;

        try {
            const resp = await WorkForceHub.apiCall('/auth/reset-password', 'POST', {
                token: document.getElementById('resetToken').value,
                newPassword: newPassword
            });
            if (resp && resp.success) {
                WorkForceHub.showToast('Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                WorkForceHub.showToast(resp?.message || 'Reset failed. Token may be expired.', 'error');
            }
        } catch (err) {
            WorkForceHub.showToast('An error occurred. Please try again.', 'error');
        } finally {
            text.style.display = 'inline';
            spinner.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
