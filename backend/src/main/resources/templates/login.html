<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WorkForceHub - Enterprise Employee Management System Login">
    <title>Login | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="logo">
            <h1><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1>
            <p>Enterprise Employee Management System</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="usernameOrEmail">Username or Email</label>
                <input type="text" id="usernameOrEmail" class="form-control-custom" placeholder="Enter your username or email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position:relative">
                    <input type="password" id="password" class="form-control-custom" placeholder="Enter your password" required>
                    <button type="button" onclick="togglePassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
                        <i class="bi bi-eye" id="togglePwdIcon"></i>
                    </button>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
                <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:var(--text-secondary);cursor:pointer">
                    <input type="checkbox" style="accent-color:var(--primary)"> Remember me
                </label>
                <a href="/forgot-password" style="font-size:0.875rem;font-weight:500">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary-custom" style="width:100%;justify-content:center;padding:0.75rem" id="loginBtn">
                <span id="loginBtnText">Sign In</span>
                <span id="loginSpinner" style="display:none"><i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite"></i></span>
            </button>

            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Don't have an account? <a href="/register" style="font-weight:600">Sign Up</a>
            </p>
        </form>

        <div style="margin-top:1.5rem;padding:1rem;background:var(--bg-secondary);border-radius:var(--border-radius-sm);font-size:0.8125rem">
            <strong style="color:var(--text-primary)">Demo Credentials:</strong><br>
            <span style="color:var(--text-secondary)">Username: <code>admin</code> | Password: <code>Admin@123</code></span>
        </div>
    </div>
</div>

<style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
    function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const text = document.getElementById('loginBtnText');
        const spinner = document.getElementById('loginSpinner');
        text.style.display = 'none';
        spinner.style.display = 'inline';
        btn.disabled = true;
        WorkForceHub.login(
            document.getElementById('usernameOrEmail').value,
            document.getElementById('password').value
        ).finally(() => {
            text.style.display = 'inline';
            spinner.style.display = 'none';
            btn.disabled = false;
        });
    }
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('togglePwdIcon');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { input.type = 'password'; icon.className = 'bi bi-eye'; }
    }
</script>
</body>
</html>
