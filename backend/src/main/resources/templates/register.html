<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="max-width:500px">
        <div class="logo">
            <h1><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1>
            <p>Create your account</p>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-control-custom" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-control-custom" placeholder="Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control-custom" placeholder="johndoe" required minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control-custom" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" class="form-control-custom" placeholder="Min 8 characters" required minlength="8">
            </div>
            <button type="submit" class="btn-primary-custom" style="width:100%;justify-content:center;padding:0.75rem">Create Account</button>
            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Already have an account? <a href="/login" style="font-weight:600">Sign In</a>
            </p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
function handleRegister(e) {
    e.preventDefault();
    WorkForceHub.register({
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('regPassword').value
    });
}
</script>
</body>
</html>
