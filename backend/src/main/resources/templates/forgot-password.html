<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="logo"><h1><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1><p>Reset your password</p></div>
        <form id="forgotForm" onsubmit="handleForgot(event)">
            <div class="form-group"><label for="fpEmail">Email Address</label><input type="email" id="fpEmail" class="form-control-custom" placeholder="Enter your registered email" required></div>
            <button type="submit" class="btn-primary-custom" style="width:100%;justify-content:center;padding:0.75rem">Send Reset Link</button>
            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Remember your password? <a href="/login" style="font-weight:600">Sign In</a>
            </p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
function handleForgot(e) {
    e.preventDefault();
    WorkForceHub.apiCall('/auth/forgot-password', 'POST', { email: document.getElementById('fpEmail').value })
        .then(r => { WorkForceHub.showToast(r?.success ? 'Reset link sent to your email' : (r?.message || 'Failed'), r?.success ? 'success' : 'error'); });
}
</script>
</body>
</html>
