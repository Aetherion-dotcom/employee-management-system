<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Requests | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="brand-icon">W</div><span class="brand">WorkForceHub</span></div>
        <nav class="sidebar-nav"><div class="nav-section"><div class="nav-section-title">Main</div>
            <a href="/dashboard" class="nav-link-custom"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="/employees" class="nav-link-custom"><i class="bi bi-people-fill"></i> Employees</a>
            <a href="/departments" class="nav-link-custom"><i class="bi bi-building"></i> Departments</a>
            <a href="/leaves" class="nav-link-custom active"><i class="bi bi-calendar-event"></i> Leave Requests</a>
        </div></nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-left"><button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button><h6 style="margin:0;font-weight:600">Leave Requests</h6></div>
            <div class="header-right"><button class="theme-toggle" id="themeToggle"><i class="bi bi-moon"></i></button></div>
        </header>
        <div class="page-content">
            <div class="page-header animate-fade-in"><div><h2>Leave Requests</h2><span class="breadcrumb">Manage employee leave applications</span></div></div>
            <div class="card-custom animate-slide-up">
                <div class="card-header-custom"><h5>Pending Requests</h5></div>
                <div style="overflow-x:auto">
                    <table class="table-custom">
                        <thead><tr><th>Employee</th><th>Leave Type</th><th>Start</th><th>End</th><th>Days</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr th:each="leave : ${pendingLeaves}">
                                <td th:text="${leave.employee.fullName}">Name</td>
                                <td><span class="badge-custom pending" th:text="${leave.leaveType}">CASUAL</span></td>
                                <td th:text="${leave.startDate}">2024-01-01</td>
                                <td th:text="${leave.endDate}">2024-01-05</td>
                                <td th:text="${leave.totalDays}">5</td>
                                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" th:text="${leave.reason}">Reason</td>
                                <td><span class="badge-custom pending">Pending</span></td>
                                <td>
                                    <div style="display:flex;gap:0.25rem">
                                        <button class="btn-icon" style="color:var(--success)" title="Approve"><i class="bi bi-check-lg"></i></button>
                                        <button class="btn-icon danger" title="Reject"><i class="bi bi-x-lg"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pendingLeaves)}">
                                <td colspan="8" style="text-align:center;padding:3rem;color:var(--text-muted)">
                                    <i class="bi bi-calendar-check" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>No pending leave requests
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
