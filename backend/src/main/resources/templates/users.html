<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Administration | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex min-vh-100 bg-body-tertiary">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="d-flex flex-column flex-shrink-0 p-3 bg-body border-end shadow-sm" style="width: 280px;" id="sidebar">
        <div class="d-flex align-items-center pb-3 mb-3 border-bottom text-decoration-none px-2"><div class="bg-primary text-white rounded d-flex align-items-center justify-content-center" style="width:32px;height:32px;font-weight:bold;">W</div><span class="fs-5 fw-bold text-body ms-2">WorkForceHub</span></div>
        <nav class="nav nav-pills flex-column mb-auto mt-3">
            <div class="nav-section">
                <div class="text-muted small fw-bold text-uppercase px-3 mb-2 mt-4">Main</div>
                <a href="/dashboard" class="nav-link link-body-emphasis mb-1"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="/employees" class="nav-link link-body-emphasis mb-1"><i class="bi bi-people-fill"></i> Employees</a>
                <a href="/departments" class="nav-link link-body-emphasis mb-1"><i class="bi bi-building"></i> Departments</a>
            </div>
            <div class="nav-section">
                <div class="text-muted small fw-bold text-uppercase px-3 mb-2 mt-4">Management</div>
                <a href="/leaves" class="nav-link link-body-emphasis mb-1"><i class="bi bi-calendar-event"></i> Leave Requests</a>
                <a href="/attendance" class="nav-link link-body-emphasis mb-1"><i class="bi bi-clock-history"></i> Attendance</a>
                <a href="/payroll" class="nav-link link-body-emphasis mb-1"><i class="bi bi-cash-stack"></i> Payroll</a>
            </div>
            <div class="nav-section">
                <div class="text-muted small fw-bold text-uppercase px-3 mb-2 mt-4">System</div>
                <a href="/swagger-ui.html" class="nav-link link-body-emphasis mb-1" target="_blank"><i class="bi bi-journal-code"></i> API Docs</a>
                <a href="/users" class="nav-link link-body-emphasis mb-1"><i class="bi bi-shield-lock"></i> Users</a>
                <a href="#" class="nav-link active mb-1"><i class="bi bi-gear"></i> Settings</a>
            </div>
        </nav>
    </aside>
    <main class="flex-grow-1 d-flex flex-column overflow-hidden">
        <header class="navbar navbar-expand-lg  bg-body border-bottom px-4 py-2 shadow-sm">
            <div class="d-flex align-items-center gap-3"><button class="btn btn-light me-2" id="menuToggle"><i class="bi bi-list"></i></button><h6 style="margin:0;font-weight:600">User Administration</h6></div>
            <div class="d-flex align-items-center gap-3 ms-auto"><button class="btn btn-light rounded-circle" id="themeToggle"><i class="bi bi-moon"></i></button></div>
        </header>
        <div class="container-fluid p-4 overflow-auto">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom animate-fade-in">
                <div>
                    <h2>User Administration</h2>
                    <span class="text-muted small">Manage system access and roles</span>
                </div>
            </div>
            
            
            <div class="card shadow-sm border-0 mb-4 animate-slide-up">
                
                <div class="card-body">
                    <div class="table-responsive"><table class="table table-hover align-middle" id="usersTable">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.username}">User</td>
                                <td><code th:text="${u.email}">email</code></td>
                                <td>
                                    <span th:each="role : ${u.roles}" class="badge me-1"
                                          th:classappend="${role.name == 'ROLE_ADMIN' ? 'bg-danger' : (role.name == 'ROLE_HR' ? 'bg-info' : 'bg-secondary')}"
                                          th:text="${role.name.replace('ROLE_', '')}">ROLE</span>
                                </td>
                                <td>
                                    <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${u.enabled}" class="badge bg-secondary">Disabled</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn btn-sm btn-light border" title="Edit Role"><i class="bi bi-pencil"></i></button>
                                        <button class="btn btn-sm btn-light border text-danger" title="Revoke Access"><i class="bi bi-ban"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="5" class="text-center text-muted py-4">No users found.</td>
                            </tr>
                        </tbody>
                    </table></div>
                </div>
            </div>

        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        /*<![CDATA[*/
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;
        if (successMsg) setTimeout(() => WorkForceHub.showToast(successMsg, 'success'), 500);
        if (errorMsg) setTimeout(() => WorkForceHub.showToast(errorMsg, 'error'), 500);
        /*]]>*/
    });
</script>
</body>

</html>
