<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="brand-icon">W</div><span class="brand">WorkForceHub</span></div>
        <nav class="sidebar-nav"><div class="nav-section"><div class="nav-section-title">Main</div>
            <a href="/dashboard" class="nav-link-custom"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="/employees" class="nav-link-custom"><i class="bi bi-people-fill"></i> Employees</a>
            <a href="/departments" class="nav-link-custom active"><i class="bi bi-building"></i> Departments</a>
        </div></nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-left"><button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button><h6 style="margin:0;font-weight:600">Departments</h6></div>
            <div class="header-right"><button class="theme-toggle" id="themeToggle"><i class="bi bi-moon"></i></button></div>
        </header>
        <div class="page-content">
            <div class="page-header animate-fade-in"><div><h2>Departments</h2><span class="breadcrumb">Organizational structure</span></div></div>
            <div class="row g-3">
                <div class="col-lg-4 col-md-6 animate-slide-up" th:each="dept, iter : ${departments}" th:style="'animation-delay:' + (${iter.index} * 0.05) + 's'">
                    <div class="card-custom" style="height:100%">
                        <div class="card-body-custom">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
                                <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--primary-50),var(--primary-100));display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700" th:text="${dept.code}">ENG</div>
                                <span class="badge-custom" th:classappend="${dept.active ? 'active' : 'inactive'}" th:text="${dept.active ? 'Active' : 'Inactive'}">Active</span>
                            </div>
                            <h5 style="font-weight:700;margin-bottom:0.25rem" th:text="${dept.name}">Engineering</h5>
                            <p style="font-size:0.8125rem;color:var(--text-muted);margin-bottom:1rem" th:text="${dept.description ?: 'No description'}">Description</p>
                            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid var(--border-color)">
                                <div><span style="font-size:1.25rem;font-weight:700" th:text="${dept.employeeCount}">0</span><span style="font-size:0.8125rem;color:var(--text-muted);margin-left:0.25rem">employees</span></div>
                                <div th:if="${dept.headName}"><span style="font-size:0.75rem;color:var(--text-muted)">Head: </span><span style="font-size:0.8125rem;font-weight:600" th:text="${dept.headName}">-</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
