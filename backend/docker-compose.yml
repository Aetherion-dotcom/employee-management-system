services:
  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: workforcehub-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-workforcehub}
      MYSQL_USER: ${DB_USERNAME:-workforcehub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-workforcehub123}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - workforcehub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Spring Boot Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workforcehub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-workforcehub}
      DB_USERNAME: ${DB_USERNAME:-workforcehub}
      DB_PASSWORD: ${DB_PASSWORD:-workforcehub123}
      JWT_SECRET: ${JWT_SECRET:-d2f8c3b4e5a6f7890123456789abcdef0123456789abcdef0123456789abcdef}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    networks:
      - workforcehub-network

volumes:
  mysql-data:
    driver: local
  app-uploads:
    driver: local
  app-logs:
    driver: local

networks:
  workforcehub-network:
    driver: bridge
